<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BetVortex Logo</title>
<style>
  body { margin: 0; background: #060E1A; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#blue)" stroke="url(#gold)" stroke-width="8"/>
  
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  
  <!-- Vortex spiral -->
  <path d="M256,100 Q350,150 350,256 Q350,350 256,350 Q180,350 150,300 Q120,250 170,200 Q200,170 256,180 Q290,185 290,220 Q290,250 260,250 Q240,250 240,235 Q240,225 255,225" 
        fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Casino chip outer -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.5"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  
  <!-- Dollar sign -->
  <text x="256" y="275" text-anchor="middle" font-family="Arial Black, Arial" font-size="80" font-weight="900" fill="url(#gold)" filter="url(#glow)">$</text>
  
  <!-- BV Text -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial Black, Arial" font-size="60" font-weight="900" fill="url(#gold)" filter="url(#glow)">BV</text>
  
  <!-- Decorative dots -->
  <circle cx="156" cy="256" r="6" fill="#FFD700" opacity="0.7"/>
  <circle cx="356" cy="256" r="6" fill="#FFD700" opacity="0.7"/>
  <circle cx="256" cy="156" r="6" fill="#FFD700" opacity="0.7"/>
  <circle cx="256" cy="356" r="6" fill="#FFD700" opacity="0.7"/>
  
  <!-- Stars -->
  <polygon points="256,50 262,68 281,68 266,79 271,97 256,86 241,97 246,79 231,68 250,68" fill="#FFD700" opacity="0.8"/>
</svg>
</body>
</html>
